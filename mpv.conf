#######################################################################################
#                                                                                     #
#              mpv.conf Configuration with Auto-Profile Shader Switching              #
#                       (Final Version with Speed Optimizations)                      #
#                                                                                     #
#######################################################################################

#######################################################################################
#                              General Settings                                       #
#######################################################################################

fs                  = yes
keep-open           = yes
force-window        = immediate
border              = no
osd-bar             = no
hwdec               = auto-safe
gpu-api             = vulkan
gpu-context         = waylandvk
vo                  = gpu-next
cache               = yes
demuxer-max-bytes   = 500M
demuxer-max-back-bytes= 100M
audio-channels      = stereo
audio-normalize-downmix = yes
volume-max          = 200
alang               = ar,jpn,jap,ja,en
slang               = ar,en
blend-subtitles     = yes
subs-with-matching-audio= no
save-position-on-quit = yes
video-output-levels   = full
ytdl-format = "bestvideo[height<=?1080]+bestaudio/best"

# --- Additions to improve startup speed ---
gpu-shader-cache=yes
gpu-shader-cache-dir="~~/shader_cache"

#######################################################################################
#                    Advanced Image Quality Settings (Scalers)                        #
#######################################################################################

scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
scale-antiring=0.6
cscale-antiring=0.6
dscale-antiring=0.6

#######################################################################################
#                      Auto-Profiles (Automatic Shader Selection)                     #
#######################################################################################

# --- Profile for live-action content (no Anime4K shaders) ---
[live-action]
profile-desc="Profile for live-action video (no Anime4K)"
deband=yes
video-sync=display-resample
dither-depth=auto
temporal-dither=yes
dither=fruit
dither-size-fruit=2
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=48


# --- Profile for anime content (with Anime4K shaders) ---
[anime]
profile-desc="Profile for anime (with Anime4K)"
glsl-shaders = "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_Restore_CNN_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"
deband=yes
video-sync=display-resample
dither-depth=auto
temporal-dither=yes
dither=fruit
dither-size-fruit=2
deband-iterations=4
deband-threshold=48
deband-range=16
deband-grain=48


# --- Auto-rule that selects between the two profiles ---
[protocol.file]
profile-desc="Auto-rule for profile selection"
profile-cond=string.lower(p.path):match('anime') or string.lower(p.path):match('cartoon')
profile=anime
profile-restore=copy

# --- Default profile for files that don't match the condition ---
[default]
profile=live-action

#######################################################################################
#                               End of Configuration                                  #
#######################################################################################